<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SFMC Email QA Tool</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #eef2f7;
  padding: 20px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.actions button {
  margin-left: 10px;
}

h1 {
  margin-bottom: 10px;
}

textarea {
  width: 100%;
  height: 150px;
  font-family: monospace;
}

button {
  padding: 8px 14px;
  cursor: pointer;
}

/* INPUTS */
input[type="text"] {
  width: 100%;
  padding: 8px;
  box-sizing: border-box;
  font-size: 13px;
}

.section {
  background: #fff;
  padding: 15px;
  margin-top: 15px;
  border-radius: 6px;
  box-shadow: 0 0 6px rgba(0,0,0,0.1);
}

/* IMAGE ROW */
.img-row {
  display: flex;
  gap: 15px;
  margin-bottom: 15px;
  padding-bottom: 15px;
  border-bottom: 1px solid #eee;
}

.preview-img {
  width: 140px;
  max-height: 80px;
  object-fit: contain;
  border: 1px solid #ddd;
  background: #fff;
}

.img-fields {
  flex: 1;
}

.field {
  margin-bottom: 8px;
}

.field label {
  font-size: 12px;
  color: #555;
  display: block;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
}

th {
  background: #f4f4f4;
}

.utm {
  background-color: #d4edda;
}

.no-utm {
  background-color: #f8d7da;
}

.legend {
  font-size: 13px;
  margin-bottom: 10px;
}

#searchBox {
  width: 300px;
  padding: 6px;
}
</style>
</head>

<body>

<div class="header">
  <h1>SFMC Email QA Tool</h1>

  <div class="actions">
    <button onclick="exportHTML()">Export</button>
    <button onclick="saveTool()">Download this tool</button>
  </div>
</div>

<input type="file" id="fileInput" accept=".html">
<br><br>

<textarea id="htmlInput" placeholder="Paste HTML here..."></textarea><br>

<button onclick="processHTML()">Run QA</button>

<br><br>
<input type="text" id="searchBox" placeholder="Search links/images..." onkeyup="filterTable()">

<div id="output"></div>

<script>
let docGlobal;

// PROCESS HTML
function processHTML() {
  const html = document.getElementById("htmlInput").value;
  const parser = new DOMParser();
  docGlobal = parser.parseFromString(html, "text/html");

  renderTables();
}

// RENDER UI
function renderTables() {
  let output = "";

  // IMAGES
  const images = docGlobal.querySelectorAll("img");

  output += `<div class="section"><h2>Images</h2>`;

  images.forEach((img, index) => {
    let src = img.getAttribute("src") || "";
    let alt = img.getAttribute("alt") || "";

    let parentLink = img.closest("a");
    let href = parentLink ? parentLink.getAttribute("href") : "";

    output += `
    <div class="img-row">
      <img src="${src}" class="preview-img">

      <div class="img-fields">
        <div class="field">
          <label>Image URL</label>
          <input type="text" value="${src}" onchange="updateImg(${index}, 'src', this.value)">
        </div>

        <div class="field">
          <label>ALT Text</label>
          <input type="text" value="${alt}" onchange="updateImg(${index}, 'alt', this.value)">
        </div>

        <div class="field">
          <label>CTA Link</label>
          <input type="text" value="${href}" onchange="updateCTA(${index}, this.value)">
        </div>
      </div>
    </div>`;
  });

  output += `</div>`;

  // LINKS
  const links = docGlobal.querySelectorAll("a");

  output += `<div class="section">
  <h2>Links</h2>

  <div class="legend">
    🟢 Links with UTM parameters are highlighted in green<br>
    🔴 Links without UTM parameters are highlighted in red
  </div>

  <table>
  <tr>
    <th>Text</th>
    <th>URL</th>
  </tr>`;

  links.forEach((link, index) => {
    let text = link.textContent.trim() || "[Image/Button]";
    let href = link.getAttribute("href") || "";

    let utmClass = href.includes("utm_") ? "utm" : "no-utm";

    output += `<tr class="${utmClass}">
      <td>${text}</td>
      <td><input type="text" value="${href}" onchange="updateLink(${index}, this.value)"></td>
    </tr>`;
  });

  output += `</table></div>`;

  document.getElementById("output").innerHTML = output;
}

// UPDATE FUNCTIONS
function updateImg(index, attr, value) {
  const imgs = docGlobal.querySelectorAll("img");
  imgs[index].setAttribute(attr, value);
  renderTables();
}

function updateCTA(index, value) {
  const imgs = docGlobal.querySelectorAll("img");
  let parentLink = imgs[index].closest("a");
  if (parentLink) parentLink.setAttribute("href", value);
}

function updateLink(index, value) {
  const links = docGlobal.querySelectorAll("a");
  links[index].setAttribute("href", value);
  renderTables();
}

// EXPORT EMAIL HTML
function exportHTML() {
  const serializer = new XMLSerializer();
  const updatedHTML = serializer.serializeToString(docGlobal);

  const blob = new Blob([updatedHTML], { type: "text/html" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "updated-email.html";
  a.click();
}

// SAVE TOOL ITSELF
function saveTool() {
  let fileName = prompt("Enter file name:", "sfmc-qa-tool.html");
  if (!fileName) return;
  if (!fileName.endsWith(".html")) fileName += ".html";

  const fullHTML = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;

  const blob = new Blob([fullHTML], { type: "text/html" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = fileName;
  a.click();
}

// SEARCH
function filterTable() {
  const query = document.getElementById("searchBox").value.toLowerCase();
  document.querySelectorAll("table tr, .img-row").forEach((row, i) => {
    if (i === 0) return;
    row.style.display = row.innerText.toLowerCase().includes(query) ? "" : "none";
  });
}

// FILE UPLOAD
document.getElementById("fileInput").addEventListener("change", function(e) {
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById("htmlInput").value = e.target.result;
  };
  reader.readAsText(e.target.files[0]);
});
</script>

</body>
</html>
